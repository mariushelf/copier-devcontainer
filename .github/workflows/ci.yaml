name: CI

# Two suites, both driven by `make` so they run identically here and locally.
# `render` runs the fast, Docker-free render checks on every push and PR. The
# heavier `devcontainer` job builds and boots the rendered container (the full
# real-session lifecycle) and runs the live checks — it runs on PRs and manual
# dispatch only, never on plain pushes to master.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# Least privilege: every job here only reads the repo. The devcontainer job
# hands github.token to PR-controlled container code, so capping the token at
# read keeps that exposure harmless even if the repo default is read/write.
permissions:
  contents: read

# The devcontainer build is expensive; a new push to a PR supersedes the
# previous run, so cancel any in-flight run for the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # uv provides `uvx copier` and `uv run --with pyyaml python`.
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        # This template repo ships no uv.lock / requirements*.txt, so uv's
        # default dependency-cache key never matches a file and never
        # invalidates. Disable caching to silence that warning; there are no
        # project dependencies worth caching here anyway.
        with:
          enable-cache: false
      - name: make test-render
        run: make test-render

  # Build and boot the rendered devcontainer (devcontainers/cli) and run the
  # live checks via `make test-devcontainer` — the same script a developer runs
  # locally. It proves the image builds, Claude Code is installed, commands run,
  # and the post-start firewall blocks out-of-allowlist egress. Slow (full image
  # build + post-create plugin installs and model warm-up), so it runs on PRs
  # and manual dispatch only — not on every push. To gate merges on it, mark
  # "devcontainer" a required status check in the branch-protection rule for
  # master.
  devcontainer:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        # This template repo ships no uv.lock / requirements*.txt, so uv's
        # default dependency-cache key never matches a file and never
        # invalidates. Disable caching to silence that warning; there are no
        # project dependencies worth caching here anyway.
        with:
          enable-cache: false
      - name: make test-devcontainer
        # The script reads $GH_TOKEN and writes it into the rendered
        # .devcontainer/.env so the container's post-create `gh auth setup-git`
        # works (capped at contents:read by the permissions block above).
        env:
          GH_TOKEN: ${{ github.token }}
        run: make test-devcontainer
